name: bauer
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - patsy
  - pymc>=5
  - pytensor
  - "arviz<1.0"          # >=1.0 broke summarize_ppc
  - jupyter
  - nbformat
  - nbconvert
  - nbsphinx
  - sphinx
  - sphinx-rtd-theme
  - pip:
    - hssm
    - numpyro            # fast NUTS backend (backend='numpyro')
    - blackjax
    - -e .               # install bauer itself (editable)
