name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow on-demand runs from the Actions tab.
  workflow_dispatch:

# Cancel any in-flight run on the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        # Configuration lives in setup.cfg.
        run: flake8 bauer tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install bauer with dev + ddm extras
        # The ddm extras pull in hssm/jax/numpyro; we need them so the
        # DDM-specific tests are exercised in CI (they're skipped otherwise).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ddm]"

      - name: Show installed package versions
        run: pip list

      - name: Run fast tests
        run: pytest -m 'not slow' -v

      - name: Run MCMC smoke tests
        run: pytest -m slow -v
